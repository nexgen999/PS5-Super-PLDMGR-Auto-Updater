name: 🎮 PS5 Mini-Store Automatique

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build-store:
    runs-on: ubuntu-latest

    steps:
      - name: 📁 Récupération du dépôt courant
        uses: actions/checkout@v4

      - name: 🐍 Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Lancement du script de synchronisation global
        env:
          GH_TOKEN: ${{ github.token }}
        run: python update_store.py

      - name: 🚀 Push de l'intégralité des fichiers sur le dépôt
        run: |
          git config --global user.name "PS5 Store Bot"
          git config --global user.email "actions@github.com"
          
          # On ajoute TOUT sans aucune restriction (.gitignore retiré)
          git add .
          
          if ! git diff --cached --quiet; then
            git commit -m "🤖 [Build Dédié] Synchronisation complète, payloads et JSON mis à jour"
            git push origin main
          else
            echo "Aucune modification détectée."
          fi
