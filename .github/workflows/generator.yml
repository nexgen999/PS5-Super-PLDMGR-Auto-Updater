name: 🎮 PS5 Mini-Store Automatique

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build-store:
    runs-on: ubuntu-latest

    steps:
      - name: 📁 Récupération du dépôt courant
        uses: actions/checkout@v4

      - name: 🐍 Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Exécution du script de synchronisation strict v3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - << 'EOF'
          import os, sys, json, re, hashlib, subprocess, urllib.request

          FEED_DIR = "feed"
          JSON_DIR = "json"
          RSS_DIR = "rss"
          PAYLOADS_ROOT = "payloads"
          
          os.makedirs(JSON_DIR, exist_ok=True)
          os.makedirs(RSS_DIR, exist_ok=True)
          os.makedirs(PAYLOADS_ROOT, exist_ok=True)

          # Liste plate globale pour le fichier payloads.json final
          all_payloads_flat_list = []
          
          readme_rows = []
          credits_list = set()

          print("=== Début de la synchronisation ===")

          if not os.path.exists(FEED_DIR):
              print(f"Erreur: Le dossier {FEED_DIR} n'existe pas.")
              sys.exit(0)

          opml_files = [f for f in os.listdir(FEED_DIR) if f.endswith('.opml')]

          for opml_file in opml_files:
              cat_tech_name = opml_file.replace('.opml', '')
              cat_display_name = cat_tech_name.replace('_', ' ').title()
              if "Hen" in cat_display_name: cat_display_name = cat_display_name.replace("Hen", "HEN")
              
              print(f"\n📁 Catégorie : {cat_display_name} ({cat_tech_name})")
              category_payloads_list = []

              with open(os.path.join(FEED_DIR, opml_file), 'r', encoding='utf-8') as f:
                  content = f.read()

              outlines = re.findall(r'<outline\s+([^>]+)/>', content)
              
              for outline in outlines:
                  attrs = dict(re.findall(r'(\w+)="([^"]*)"', outline))
                  title = attrs.get('title', 'Inconnu')
                  xml_url = attrs.get('xmlUrl', '').strip('/')
                  author = attrs.get('author', 'Inconnu')
                  description = attrs.get('description', '')

                  if not xml_url:
                      continue

                  print(f" 🔍 Analyse de {title} ({xml_url})...")
                  credits_list.add(f"- **{author}** : [{title}]({xml_url})")

                  version = "v1.0.0"
                  downloaded = False
                  
                  # 1. TRAITEMENT GITHUB
                  if "github.com" in xml_url:
                      repo_match = re.search(r'github\.com/([^/]+/[^/]+)', xml_url)
                      if repo_match:
                          repo = repo_match.group(1)
                          try:
                              res_tag = subprocess.check_output(f"gh repo view {repo} --json latestRelease --jq '.latestRelease.tagName'", shell=True, env=os.environ).decode().strip()
                              if res_tag: version = res_tag
                          except:
                              pass
                          
                          version_clean = re.sub(r'[^a-zA-Z0-9._-]', '', version)
                          target_dir = os.path.join(PAYLOADS_ROOT, cat_tech_name, title.replace(" ", "_"), version_clean)
                          os.makedirs(target_dir, exist_ok=True)

                          try:
                              subprocess.call(f"gh release download '{version}' --repo '{repo}' --dir '{target_dir}' --clobber 2>/dev/null", shell=True, env=os.environ)
                              downloaded = True
                          except:
                              pass

                  # 2. TRAITEMENT DÉPÔTS EXTERNES (Gitea / Forgejo comme git.etawen.dev)
                  if not downloaded:
                      version_clean = re.sub(r'[^a-zA-Z0-9._-]', '', version)
                      target_dir = os.path.join(PAYLOADS_ROOT, cat_tech_name, title.replace(" ", "_"), version_clean)
                      os.makedirs(target_dir, exist_ok=True)
                      try:
                          # Lecture du flux d'activité Atom des releases
                          rss_url = f"{xml_url}/releases.atom"
                          req = urllib.request.Request(rss_url, headers={'User-Agent': 'Mozilla/5.0'})
                          html = urllib.request.urlopen(req).read().decode('utf-8')
                          
                          # Extraction du tag de version depuis l'entry du flux Atom s'il existe
                          tag_match = re.search(r'<title>([^<]+)</title>', html)
                          if tag_match and tag_match.group(1) != title:
                              version = tag_match.group(1).strip()
                              version_clean = re.sub(r'[^a-zA-Z0-9._-]', '', version)
                              # Réajustement dynamique du dossier avec la vraie version lue
                              os.rename(target_dir, os.path.join(PAYLOADS_ROOT, cat_tech_name, title.replace(" ", "_"), version_clean))
                              target_dir = os.path.join(PAYLOADS_ROOT, cat_tech_name, title.replace(" ", "_"), version_clean)

                          # Recherche des URLs de téléchargement d'assets directes ou d'archives zip/tar.gz
                          links = re.findall(r'href="([^"]+/(?:releases|archive|attachments)/[^"]+\.(?:elf|bin|pkg|zip|tar\.gz))"', html)
                          if links:
                              file_dl_url = links[0]
                              if file_dl_url.startswith('/'):
                                  base_url = re.match(r'(https?://[^/]+)', xml_url).group(1)
                                  file_dl_url = base_url + file_dl_url
                              f_name = file_dl_url.split('/')[-1]
                              urllib.request.urlretrieve(file_dl_url, os.path.join(target_dir, f_name))
                              print(f"   => Fichier externe récupéré : {f_name}")
                      except Exception as e:
                          print(f"   ⚠️ Échec de la récupération externe : {e}")

                  # ANALYSE DU CONTENU ET SHA-256
                  files_in_dir = os.listdir(target_dir) if os.path.exists(target_dir) else []
                  main_file = None
                  sha256_hash = ""

                  for f_name in files_in_dir:
                      if f_name.endswith('.elf') or f_name.endswith('.bin'):
                          main_file = f_name
                          full_path = os.path.join(target_dir, f_name)
                          hasher = hashlib.sha256()
                          with open(full_path, 'rb') as fb:
                              for chunk in iter(lambda: fb.read(4096), b""): hasher.update(chunk)
                          sha256_hash = hasher.hexdigest()
                          break

                  if not main_file:
                      for f_name in files_in_dir:
                          if f_name.endswith('.zip') or f_name.endswith('.pkg') or f_name.endswith('.tar.gz'):
                              main_file = f_name
                              sha256_hash = "N/A (Package/Archive)"
                              break

                  if main_file:
                      repo_name = os.environ.get('GITHUB_REPOSITORY', 'PS5-Store').split('/')[-1]
                      file_url = f"https://nexgen999.github.io/{repo_name}/{target_dir.replace(os.sep, '/')}/{main_file}"

                      item_data = {
                          "title": title,
                          "author": author,
                          "version": version,
                          "url": file_url,
                          "sha256": sha256_hash,
                          "description": description
                      }
                      category_payloads_list.append(item_data)
                      all_payloads_flat_list.append(item_data)
                      
                      repo_folder_url = f"https://github.com/nexgen999/{repo_name}/tree/main/{target_dir.replace(os.sep, '/')}"
                      readme_rows.append(f"| **{title}** | {author} | {cat_display_name} | [{version}]({repo_folder_url}) | `{sha256_hash[:10]}...` | {description} |")

              # Génération du JSON par catégorie (Ex: ps5_dns.json)
              cat_final_json = {
                  "name": f"{cat_tech_name} (PLDMGR Updater)",
                  "payloads": category_payloads_list
              }
              with open(os.path.join(JSON_DIR, f"{cat_tech_name}.json"), 'w', encoding='utf-8') as out_cat:
                  json.dump(cat_final_json, out_cat, indent=2, ensure_ascii=False)

          # Génération du payloads.json global (Structure plate sans catégories imbriquées)
          global_flat_json = {
              "name": "payloads",
              "payloads": all_payloads_flat_list
          }
          with open(os.path.join(JSON_DIR, "payloads.json"), 'w', encoding='utf-8') as out_glob:
              json.dump(global_flat_json, out_glob, indent=2, ensure_ascii=False)

          # MISE A JOUR DU README
          if os.path.exists("README.md"):
              with open("README.md", 'r', encoding='utf-8') as r_file:
                  lines = r_file.readlines()
              
              new_lines = []
              skip_table = False
              skip_credits = False
              
              table_content = "| Application | Auteur | Catégorie | Version (Dépôt) | Empreinte SHA-256 | Description |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n" + "\n".join(readme_rows) + "\n"
              credits_content = "\n".join(sorted(list(credits_list))) + "\n"

              for line in lines:
                  if "" in line:
                      new_lines.append(line)
                      new_lines.append("\n" + table_content + "\n")
                      skip_table = True
                      continue
                  if "" in line:
                      skip_table = False
                  if "" in line:
                      new_lines.append(line)
                      new_lines.append("\n" + credits_content + "\n")
                      skip_credits = True
                      continue
                  if "" in line:
                      skip_credits = False
                  
                  if not skip_table and not skip_credits:
                      new_lines.append(line)

              with open("README.md", 'w', encoding='utf-8') as r_file:
                  r_file.writelines(new_lines)

          print("=== Synchronisation terminée ===")
          EOF

      - name: 🚀 Push des modifications sur le dépôt
        run: |
          git config --global user.name "PS5 Store Bot"
          git config --global user.email "actions@github.com"
          
          # Nettoyage résiduel automatique des répertoires orphelins éventuels
          rm -rf ps5_dnss ps5_dns ps5_hen_loaders ps5_hen_loader 2>/dev/null
          
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "🤖 [Mise à jour v3] Correction structure payloads.json & support strict git.etawen.dev"
            git push
          else
            echo "Aucune modification."
          fi
